<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>floor</title>
    <link rel="apple-touch-icon" href="index.png">
    <link rel="icon" type="image/png" sizes="192x192" href="index.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" />
    <script src="bundle.js" defer></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="message"></div>
    <aside id="controls" class="controls" aria-label="View controls" hidden>
      <div class="controls__row controls__row--header">
        <label class="controls__label" for="plan-select">Plan <kbd>O</kbd><kbd>P</kbd></label>
        <select id="plan-select" class="controls__select"></select>
        <button
          type="button"
          class="controls__collapse"
          data-action="toggle-panel"
          aria-expanded="true"
          aria-label="Collapse debug panel"
        >
          <span class="controls__collapse-icon" aria-hidden="true">▾</span>
        </button>
      </div>

      <div class="controls__group">
        <div class="controls__row">
          <span class="controls__label">Move</span>
          <div class="controls__buttons controls__buttons--move">
            <button type="button" data-command="turn-left" aria-label="Turn left">↶ <kbd>Q</kbd></button>
            <button type="button" data-command="move-forward" aria-label="Move forward">↑ <kbd>W</kbd></button>
            <button type="button" data-command="turn-right" aria-label="Turn right">↷ <kbd>E</kbd></button>
            <button type="button" data-command="move-left" aria-label="Move left">← <kbd>A</kbd></button>
            <button type="button" data-command="move-backward" aria-label="Move backward">↓ <kbd>S</kbd></button>
            <button type="button" data-command="move-right" aria-label="Move right">→ <kbd>D</kbd></button>
          </div>
        </div>
      </div>

      <div class="controls__group">
        <div class="controls__row controls__row--field">
          <label class="controls__label" for="state-current">Tile</label>
          <div class="controls__field">
            <input id="state-current" data-field="current" type="number" step="1" />
          </div>
        </div>

        <div class="controls__row controls__row--field">
          <label class="controls__label" for="state-x">X</label>
          <div class="controls__field">
            <input id="state-x" data-field="x" type="number" step="0.05" />
          </div>
        </div>

        <div class="controls__row controls__row--field">
          <label class="controls__label" for="state-y">Y</label>
          <div class="controls__field">
            <input id="state-y" data-field="y" type="number" step="0.05" />
          </div>
        </div>

        <div class="controls__row controls__row--field">
          <label class="controls__label" for="state-rotation">Rot</label>
          <div class="controls__field">
            <input id="state-rotation" data-field="rotation" type="number" step="0.05" />
          </div>
        </div>

        <div class="controls__row controls__row--field">
          <label class="controls__label" for="state-scale">Scale <kbd>5</kbd><kbd>6</kbd></label>
          <div class="controls__field">
            <input id="state-scale" data-field="scale" type="number" step="0.05" min="0.01" />
          </div>
        </div>

        <div class="controls__row controls__row--field">
          <label class="controls__label" for="state-factor">Zoom <kbd>7</kbd><kbd>8</kbd></label>
          <div class="controls__field">
            <input id="state-factor" data-field="factor" type="number" step="0.05" min="0.01" />
          </div>
        </div>

        <div class="controls__row controls__row--field">
          <label class="controls__label" for="state-range">Warp <kbd>9</kbd><kbd>0</kbd></label>
          <div class="controls__field">
            <input id="state-range" data-field="range" type="number" step="0.05" min="0.01" />
          </div>
        </div>
      </div>

      <div class="controls__group controls__stats" aria-live="polite">
        <label class="controls__stat">
          <span>Tiles</span>
          <input id="stats-tiles" type="text" value="0" readonly tabindex="-1" />
        </label>
        <label class="controls__stat">
          <span>Depth</span>
          <input id="stats-depth" type="text" value="0" readonly tabindex="-1" />
        </label>
        <label class="controls__stat">
          <span>Branches</span>
          <input id="stats-branches" type="text" value="0" readonly tabindex="-1" />
        </label>
        <label class="controls__stat">
          <span>FPS</span>
          <input id="stats-fps" type="text" value="0" readonly tabindex="-1" />
        </label>
      </div>

      <div class="controls__group controls__footer">
        <label><input id="toggle-debug" data-toggle="debug" type="checkbox" /> Debug <kbd>X</kbd></label>
        <button type="button" class="controls__reset" data-action="reset">Reset <kbd>R</kbd></button>
      </div>
    </aside>
    <canvas id="canvas">Your browser does not support canvas element.</canvas>
  </body>
</html>
